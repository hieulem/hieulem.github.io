<!DOCTYPE html>
<!-- updated: authors-before-venues-links-inline-keywords-after-icons -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Research | Computer Vision Lab</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>

    :root {
      --text: #0f172a;
      --muted: #64748b;
      --soft: #94a3b8;
      --line: rgba(148, 163, 184, 0.28);
      --accent: #2563eb;
      --accent-strong: #1d4ed8;
      --accent-soft: #eff6ff;
      --surface: rgba(255, 255, 255, 0.84);
      --surface-solid: #ffffff;
      --bg: #f8fafc;
      --radius: 22px;
      --max-width: 1280px;
      --shadow: 0 24px 70px rgba(15, 23, 42, 0.10);
      --shadow-soft: 0 12px 32px rgba(15, 23, 42, 0.07);
      --pub-gap: 0.95rem;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 0%, rgba(37, 99, 235, 0.15), transparent 30rem),
        radial-gradient(circle at 92% 10%, rgba(14, 165, 233, 0.10), transparent 24rem),
        linear-gradient(180deg, #ffffff 0%, #f7faff 46%, #edf4ff 100%);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255, 255, 255, 0.74);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }

    .navbar-content {
      max-width: var(--max-width);
      min-height: 64px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-wrap: wrap;
    }

    .navbar a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.96rem;
      font-weight: 760;
      padding: 0.55rem 0.85rem;
      border-radius: 999px;
      transition: color 0.16s ease, background 0.16s ease, transform 0.16s ease;
    }

    .navbar a:hover,
    .navbar a.active {
      color: var(--accent-strong);
      background: var(--accent-soft);
    }

    .navbar a:hover { transform: translateY(-1px); }

    main {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 1.6rem 1.5rem 2.5rem;
    }

    .research-hero {
      position: relative;
      overflow: hidden;
      margin: 0 0 1.35rem;
      padding: clamp(1.35rem, 3vw, 2.2rem);
      border: 1px solid var(--line);
      border-radius: 30px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.94), rgba(239, 246, 255, 0.78));
      box-shadow: var(--shadow-soft);
    }

    .research-hero::after {
      content: "";
      position: absolute;
      right: -5rem;
      top: -5rem;
      width: 16rem;
      height: 16rem;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.10);
    }

    .research-eyebrow {
      margin: 0 0 0.45rem;
      color: var(--accent-strong);
      font-size: 0.78rem;
      font-weight: 850;
      letter-spacing: 0.11em;
      text-transform: uppercase;
    }

    .research-hero h1 {
      margin: 0;
      max-width: 780px;
      font-size: clamp(2.25rem, 4vw, 4.1rem);
      line-height: 0.98;
      letter-spacing: -0.065em;
    }

    .research-hero p {
      margin: 0.85rem 0 0;
      max-width: 760px;
      color: var(--muted);
      font-size: clamp(1.05rem, 1.35vw, 1.18rem);
    }

    .research-layout {
      display: grid;
      grid-template-columns: minmax(250px, 300px) minmax(0, 1fr);
      gap: 1.25rem;
      align-items: start;
    }

    .area-list {
      position: sticky;
      top: 84px;
      display: grid;
      gap: 0.85rem;
    }

    .area-button {
      position: relative;
      min-height: 136px;
      width: 100%;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 24px;
      padding: 1.1rem;
      color: #fff;
      text-align: left;
      cursor: pointer;
      background: #111827;
      box-shadow: var(--shadow-soft);
      isolation: isolate;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .area-button::before,
    .area-button::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
    }

    .area-button::before {
      background-image: var(--area-image);
      background-size: cover;
      background-position: center;
      transform: scale(1.02);
      transition: transform 0.24s ease;
    }

    .area-button::after {
      background:
        linear-gradient(120deg, rgba(15, 23, 42, 0.82), rgba(15, 23, 42, 0.38) 58%, rgba(15, 23, 42, 0.08)),
        linear-gradient(0deg, rgba(15, 23, 42, 0.24), rgba(15, 23, 42, 0.06));
    }

    .area-button:hover,
    .area-button.active {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .area-button:hover::before,
    .area-button.active::before { transform: scale(1.08); }

    .area-button.active {
      border-color: rgba(219, 234, 254, 0.95);
      outline: 3px solid rgba(37, 99, 235, 0.24);
    }

    .area-button h2 {
      position: absolute;
      left: 1.1rem;
      right: 1.1rem;
      bottom: 1rem;
      margin: 0;
      font-size: 1.34rem;
      line-height: 1.05;
      font-weight: 850;
      letter-spacing: -0.035em;
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.55);
    }

    .publications-panel {
      min-width: 0;
      padding: 1.05rem;
      border: 1px solid var(--line);
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.70);
      box-shadow: var(--shadow-soft);
    }

    .selected-publications-label {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      margin: 0 0 0.9rem;
      color: var(--accent-strong);
      font-size: 0.84rem;
      font-weight: 850;
      letter-spacing: 0.075em;
      text-transform: uppercase;
    }

    .selected-publications-label::before {
      content: "";
      width: 0.58rem;
      height: 0.58rem;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.12);
    }

    .publications-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--pub-gap);
    }

    .pub-card {
      display: flex;
      min-width: 0;
      min-height: 178px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--surface-solid);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.055);
      padding: 1.05rem;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .pub-card:hover {
      transform: translateY(-2px);
      border-color: rgba(37, 99, 235, 0.42);
      box-shadow: var(--shadow-soft);
    }

    .pub-thumbnail,
    .pub-thumbnail img { display: none; }

    .pub-content {
      display: flex;
      flex: 1;
      min-width: 0;
      flex-direction: column;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0;
    }

    .pub-title {
      margin: 0;
      color: var(--text);
      font-size: 1.08rem;
      line-height: 1.23;
      font-weight: 820;
      letter-spacing: -0.027em;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .pub-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.28rem 0.45rem;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.;
      font-weight: 650;
    }

    .pub-authors {
      color: #334155;
      font-weight: 760;
    }

    .pub-meta span:not(:last-child)::after {
      content: "•";
      margin-left: 0.2rem;
      color: var(--soft);
      font-weight: 700;
    }

    .pub-venue {
      color: var(--accent-strong);
      font-weight: 800;
    }

    .pub-link-keyword-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.2rem;
      margin-top: auto;
      padding-top: 0.3rem;
      border-top: 1px solid var(--line);
    }

    .pub-links {
      display: inline-flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .pub-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.8rem;
      height: 1.8rem;
      color: var(--accent-strong);
      background: var(--accent-soft);
      border: 1px solid rgba(37, 99, 235, 0.12);
      border-radius: 999px;
      text-decoration: none;
      transition: color 0.15s ease, background 0.15s ease, transform 0.15s ease;
    }

    .pub-link:hover {
      color: white;
      background: var(--accent);
      transform: translateY(-1px);
    }

    .pub-keywords {
      display: inline-flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin: 0;
    }

    .keyword {
      display: inline-flex;
      align-items: center;
      min-height: 1.8rem;
      padding: 0.22rem 0.58rem;
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 999px;
      background: #f8fafc;
      color: var(--muted);
      font-size: 0.72rem;
      line-height: 1;
      font-weight: 750;
      white-space: nowrap;
    }

    .empty-state,
    .error-state {
      grid-column: 1 / -1;
      padding: 1.25rem;
      border: 1px dashed var(--line);
      border-radius: 22px;
      color: var(--muted);
      background: white;
      font-size: 0.98rem;
    }

    .error-state {
      color: #b91c1c;
      border-color: #fecaca;
      background: #fef2f2;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 1120px) {
      .publications-grid { grid-template-columns: 1fr; }
      .research-layout { grid-template-columns: minmax(240px, 285px) minmax(0, 1fr); }
    }

    @media (max-width: 820px) {
      main { padding: 1rem; }
      .research-layout { grid-template-columns: 1fr; }
      .area-list {
        position: static;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .area-button { min-height: 150px; }
      .publications-panel { padding: 0.85rem; }
    }

    @media (max-width: 560px) {
      .navbar-content { padding: 0.65rem 0.8rem; }
      .area-list { grid-template-columns: 1fr; }
      .pub-card { min-height: auto; }
      .pub-title { font-size: 1rem; }
      .pub-meta { font-size: 0.78rem; }
    }

  </style>
</head>
<body>
  <nav class="navbar" aria-label="Main navigation">
    <div class="navbar-content">
      <a href="../../index.html">Home</a>
      <a href="../publications/index.html">Publications</a>
      <a href="../students/index.html">Students</a>
      <a href="../hiring/index.html">Hiring</a>
      <a href="index.html" class="active" aria-current="page">Research</a>
    </div>
  </nav>

  <main>

    <section class="research-layout" aria-label="Research publications">
      <div class="area-list" id="area-list"></div>
      <div class="publications-panel">
        <div class="selected-publications-label" id="selected-publications-label">Selected publications</div>
        <div class="publications-grid" id="publication-grid" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script>
    const AREAS = [
      {
        key: 'constraints',
        title: 'Constrained Learning',
        image: 'constraints.png',
        keywords: ['controllable', 'constraint', 'constraints', 'constrained', 'domain-knowledge']
      },
      {
        key: 'uncertainty',
        title: 'Uncertainty Quantification',
        image: 'uncertainty.png',
        keywords: ['uncertainty', 'calibration', 'confidence', 'robustness']
      },
      {
        key: 'three-d',
        title: '3D Vision & Geometry',
        image: '3D.png',
        keywords: ['3d', '3-d', 'udf', 'sdf', 'implicit', 'implicit-functions', 'mesh', 'geometry', 'reconstruction']
      },
      {
        key: 'generative',
        title: 'Generative Models',
        image: 'generative.png',
        keywords: ['generative', 'generative-models', 'diffusion', 'image-generation', 'video-generation']
      }
    ];

    let allPublications = [];
    let selectedAreaKey = AREAS[0].key;

    function escapeHTML(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function safeURL(value) {
      const url = String(value ?? '').trim();
      if (!url) return '';
      if (url.startsWith('http://') || url.startsWith('https://') || url.startsWith('./') || url.startsWith('../') || url.startsWith('/')) return url;
      return '';
    }

    function normalizeKeyword(value) {
      return String(value ?? '').toLowerCase().replace(/_/g, '-').trim();
    }

    function matchingPublications(area) {
      return allPublications
        .filter(pub => {
          const pubKeywords = Array.isArray(pub.keywords) ? pub.keywords.map(normalizeKeyword) : [];
          return pubKeywords.some(pubKeyword => area.keywords.some(areaKeyword => pubKeyword.includes(areaKeyword)));
        })
        .sort((a, b) => (parseInt(b.year, 10) || 0) - (parseInt(a.year, 10) || 0))
        .slice(0, 8);
    }

    function renderAreaButtons() {
      const list = document.getElementById('area-list');
      list.innerHTML = AREAS.map(area => `
        <button
          type="button"
          class="area-button${area.key === selectedAreaKey ? ' active' : ''}"
          style="--area-image: url('${escapeHTML(area.image)}')"
          data-area-key="${escapeHTML(area.key)}"
          aria-pressed="${area.key === selectedAreaKey ? 'true' : 'false'}">
          <h2>${escapeHTML(area.title)}</h2>
        </button>
      `).join('');

      list.querySelectorAll('.area-button').forEach(button => {
        button.addEventListener('click', () => selectArea(button.dataset.areaKey));
      });
    }

    function renderPublicationCard(pub) {
      const card = document.createElement('article');
      card.className = 'pub-card';

      const title = escapeHTML(pub.title || 'Untitled publication');
      const venue = escapeHTML(pub.venue || 'Preprint');
      const year = escapeHTML(pub.year || 'TBD');
      const authors = Array.isArray(pub.authors)
        ? pub.authors.filter(Boolean).join(', ')
        : (pub.authors || pub.author || '');
      const authorsHTML = authors ? `<span class="pub-authors">${escapeHTML(authors)}</span>` : '';
      const thumbnail = safeURL(pub.thumbnail ? `../../${pub.thumbnail}` : '');

      const thumbnailHTML = thumbnail
        ? `<div class="pub-thumbnail"><img src="${escapeHTML(thumbnail)}" alt="${title}"></div>`
        : `<div class="pub-thumbnail" aria-hidden="true"><i class="fas fa-file-lines"></i></div>`;

      const keywordsHTML = Array.isArray(pub.keywords)
        ? pub.keywords
            .slice(0, 3)
            .map(keyword => `<span class="keyword">${escapeHTML(String(keyword).replace(/-/g, ' '))}</span>`)
            .join('')
        : '';

      const linkIcons = {
        arxiv: 'fas fa-book',
        paper: 'fas fa-file-lines',
        pdf: 'fas fa-file-pdf',
        project: 'fas fa-globe',
        openreview: 'fas fa-comments',
        code: 'fas fa-code',
        github: 'fab fa-github',
        data: 'fas fa-database',
        video: 'fas fa-play'
      };

      const linksHTML = pub.links && typeof pub.links === 'object'
        ? Object.entries(pub.links)
            .map(([name, url]) => {
              const href = safeURL(url);
              if (!href) return '';
              const key = String(name).toLowerCase();
              const icon = linkIcons[key] || 'fas fa-link';
              return `<a href="${escapeHTML(href)}" target="_blank" rel="noopener noreferrer" class="pub-link" title="${escapeHTML(name)}"><i class="${icon}" aria-hidden="true"></i><span class="sr-only">${escapeHTML(name)}</span></a>`;
            })
            .join('')
        : '';

      const linkKeywordRowHTML = linksHTML || keywordsHTML
        ? `<div class="pub-link-keyword-row">${linksHTML ? `<div class="pub-links">${linksHTML}</div>` : ''}${keywordsHTML ? `<div class="pub-keywords">${keywordsHTML}</div>` : ''}</div>`
        : '';

      card.innerHTML = `<div class="pub-content"><h3 class="pub-title">${title}</h3><div class="pub-meta">${authorsHTML}<span class="pub-venue">${venue}</span><span>${year}</span></div>${linkKeywordRowHTML}</div>`;

      return card;
    }

    function selectArea(areaKey) {
      const area = AREAS.find(item => item.key === areaKey) || AREAS[0];
      selectedAreaKey = area.key;

      document.querySelectorAll('.area-button').forEach(button => {
        const isActive = button.dataset.areaKey === area.key;
        button.classList.toggle('active', isActive);
        button.setAttribute('aria-pressed', String(isActive));
      });

      const grid = document.getElementById('publication-grid');
      const label = document.getElementById('selected-publications-label');
      label.textContent = `Selected publications · ${area.title}`;
      const selected = matchingPublications(area);
      grid.innerHTML = '';

      if (!selected.length) {
        grid.innerHTML = '<div class="empty-state">No matching publications found.</div>';
        return;
      }

      selected.forEach(pub => grid.appendChild(renderPublicationCard(pub)));
    }

    function renderError() {
      document.getElementById('publication-grid').innerHTML = '<div class="error-state">Publications could not be loaded.</div>';
    }

    async function loadPublications() {
      renderAreaButtons();

      try {
        const response = await fetch('../../publications.yaml');
        if (!response.ok) throw new Error(`Could not load publications.yaml (${response.status})`);

        const yamlText = await response.text();
        const publications = jsyaml.load(yamlText) || [];
        if (!Array.isArray(publications)) throw new Error('publications.yaml should contain a list');

        allPublications = publications;
        selectArea(selectedAreaKey);
      } catch (error) {
        console.error('Error loading publications:', error);
        renderError();
      }
    }

    document.addEventListener('DOMContentLoaded', loadPublications);
  </script>
</body>
</html>
